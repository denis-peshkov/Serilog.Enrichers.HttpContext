# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches:
      - master
      - hotfix/*
      - release/*
  pull_request:
    branches:
      - master
  workflow_dispatch: # <-- вот это даёт ручной запуск

jobs:
  build:

    env:
      BUILD_CONFIG: 'Release'
      SOLUTION: 'Serilog.Enrichers.HttpContext.slnx'

    runs-on: ubuntu-22.04 # ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

#      - name: Hello world action step
#        id: hello
#        uses: denis-peshkov/update-nuspec-action@master
#        with:
#          dir: './test'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            3.1.x
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      #      - name: Install Mono
      #        run: |
      #          apt-get install -y mono-runtime
      #          apt-get install -y mono-complete
      #          apt-get install -y nuget

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2.0.0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: 5.12.0

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v1.1.1
        with:
          useConfigFile: true

      - name: Restore dependencies
        run: dotnet restore

#      - name: Restore dependencies with NuGet
#        run: nuget restore $SOLUTION

#      - name: Build
#        run: dotnet build $SOLUTION --configuration $BUILD_CONFIG --no-restore

      - name: Build
        run: |
          dotnet build "$SOLUTION" --configuration "$BUILD_CONFIG" --no-restore \
          -p:Configuration=$BUILD_CONFIG \
          -p:Version=${GitVersion_SemVer} \
          -p:AssemblyVersion=${GitVersion_AssemblySemVer} \
          -p:FileVersion=${GitVersion_AssemblySemFileVer} \
          -p:InformationalVersion="${GitVersion_InformationalVersion}" \
          -p:Company="Denis Peshkov" \
          -p:Product="Serilog.Enrichers.HttpContext" \
          -p:Description="Enriches Serilog events with client IP and Correlation Id and RequestBody and RequestQuery and HTTP request headers and information of the memory usage." \
          -p:RepositoryUrl="https://github.com/denis-peshkov/Serilog.Enrichers.HttpContext.git" \
          -p:RepositoryType=git \
          -p:CLSCompliant=true \
          -p:NeutralLanguage=en

#      - name: Run tests
#        run: dotnet test /p:Configuration=$BUILD_CONFIG --no-restore --no-build --verbosity normal

      - name: Run tests
        run: >
          dotnet test /p:Configuration=$BUILD_CONFIG
          --no-restore
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # Coverlet + OpenCover как в SonarCloud (.NET test coverage → Coverlet):
      # https://docs.sonarsource.com/sonarqube-cloud/enriching/test-coverage/dotnet-test-coverage
#      - name: Coverlet OpenCover report
#        run: |
#          dotnet tool install --global coverlet.console --version 6.0.2
#          coverlet "Serilog.Enrichers.HttpContext.UnitTests/bin/${BUILD_CONFIG}/net10.0/Serilog.Enrichers.HttpContext.UnitTests.dll" \
#            --target "dotnet" \
#            --targetargs "test Serilog.Enrichers.HttpContext.UnitTests/Serilog.Enrichers.HttpContext.UnitTests.csproj --no-build --configuration ${BUILD_CONFIG} -f net10.0 --verbosity minimal" \
#            -f=opencover \
#            -o="coverage.opencover.xml"

      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v5 # Ex: v4.0.0, See the latest version at https://github.com/marketplace/actions/sonarcloud-scan
        with:
          #          projectBaseDir: app/
          #          args: >
          #            -Dsonar.organization=peshkov
          #            -Dsonar.projectKey=Serilog.Enrichers.HttpContext
          #            -Dsonar.python.coverage.reportPaths=coverage.xml
          #            -Dsonar.sources=Serilog.Enrichers.HttpContext/
          #            -Dsonar.tests=tests/
          #            -Dsonar.exclusions=tests/**
          #            -Dsonar.inclusions=tests/**
          #            -Dsonar.test.exclusions=tests/**
          #            -Dsonar.test.inclusions=tests/**
          #            -Dsonar.coverage.exclusions=tests/**
          #            -Dsonar.verbose=true
          args: >
            -Dsonar.organization=peshkov
            -Dsonar.projectKey=Serilog.Enrichers.HttpContext
            -Dsonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml
            -Dsonar.sources=src/Serilog.Enrichers.HttpContext/
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Nuget Pack
        run: nuget pack config.nuspec -Symbols -Version ${{ env.semVer }}

      - name: ref
        run: echo "github.head_ref 1 ${{ github.head_ref }} 2 $GITHUB_REF 3 ${{ github.ref }}"

#      - name: Create Tag
#        uses: rickstaa/action-create-tag@v1.7.2
#        with:
#          tag: v${{ env.semVer }}

      - name: Create git Tag
        if: ${{ contains('refs/heads/hotfix', github.ref) || contains('refs/heads/hotfix', github.ref) || contains('refs/heads/master', github.ref) }}
#        if: ${{ contains(fromJson('["refs/heads/master", "refs/heads/release", "refs/heads/hotfix"]'), github.ref) }}
        run: |
          git tag v${{ env.semVer }}

#      - name: Push git tag
#        run: git push origin v${{ env.semVer }}

      - name: Push git Tag
        if: ${{ contains(fromJson('["refs/heads/master", "refs/heads/release", "refs/heads/hotfix"]'), github.ref) }}
        run: |
          git config --global user.name 'Denis Peshkov'
          git config --global user.email 'denis.peshkov@outlook.com'
          git remote set-url origin https://x-access-token:${{ secrets.TAGTOKEN }}@github.com/${{ github.repository }}
          git push origin v${{ env.semVer }}

#      - name: Tag commit
#        uses: tvdias/github-tagger@v0.0.2
#        with:
#          repo-token: "${{ secrets.GITHUB_TOKEN }}"
#          tag: "v${{ env.semVer }}"

#      - name: Create tag
#        uses: actions/github-script@v5
#        with:
#          script: |
#            github.rest.git.createRef({
#              owner: context.repo.owner,
#              repo: context.repo.repo,
#              ref: 'refs/tags/v${{env.semVer}}',
#              sha: context.sha
#            })

      - name: Nuget Push
        if: ${{ !startsWith(github.ref, 'refs/pull') }}
        run: nuget push **/Serilog.Enrichers.HttpContext.${{ env.semVer }}.symbols.nupkg -ApiKey ${{ secrets.NUGET_API_KEY }} -Source "https://api.nuget.org/v3/index.json" -SkipDuplicate
